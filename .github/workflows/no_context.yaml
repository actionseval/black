name: CI

on:
  push:
  pull_request:

jobs:
  main:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt update
          # sudo apt install -y adduser base-files bash bash-completion command-not-found cron debconf distro-info-data e2fsprogs fuse3 gettext-base hdparm keyutils libattr1:amd64 libaudit-common libc-bin libc6:amd64 libmagic1:amd64 libmecab2:amd64 libpam-runtime libpcre2-8-0:amd64 libpython3.13-stdlib:amd64 libsensors-config libtirpc-common locales login logrotate lsb-release ltrace mailcap man-db media-types multipath-tools nano ncurses-base netbase nftables openssl overlayroot procps python3-zope.interface python3.13 rsyslog screen sudo tar tzdata ucf unixodbc-common usb-modeswitch walinuxagent wget

      - name: Install Python tools
        run: |
          pip install setuptools==80.9.0

      - name: Upgrade pip and tox
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade tox

      - name: Run tox CI
        run: |
          tox -e ci-py$(echo "3.13" | tr -d '.') -- -v --color=yes

  uvloop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt update
          # sudo apt install -y adduser base-files bash bash-completion command-not-found cron debconf distro-info-data e2fsprogs fuse3 gettext-base hdparm keyutils libattr1:amd64 libaudit-common libc-bin libc6:amd64 libmagic1:amd64 libmecab2:amd64 libpam-runtime libpcre2-8-0:amd64 libpython3.13-stdlib:amd64 libsensors-config libtirpc-common locales login logrotate lsb-release ltrace mailcap man-db media-types multipath-tools nano ncurses-base netbase nftables openssl overlayroot procps python3-zope.interface python3.13 rsyslog screen sudo tar tzdata ucf unixodbc-common usb-modeswitch walinuxagent wget

      - name: Install Python tools for uvloop
        run: |
          pip install setuptools==80.9.0 wheel==0.45.1

      - name: Upgrade pip without version check
        run: |
          python -m pip install pip --upgrade --disable-pip-version-check

      - name: Install project in editable mode with uvloop extras
        run: |
          python -m pip install -e ".[uvloop]"

      - name: Run static checks
        run: |
          python -m black --check src/ tests/
